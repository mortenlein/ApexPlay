services:
  apexplay:
    build: .
    container_name: apexplay
    ports:
      - "4001:4001"
    volumes:
      # Persist the SQLite database across container restarts
      - apexplay_data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      - ADMIN_PASSWORD=Tjarb123
      - STEAM_API_KEY=YOUR_STEAM_API_KEY_HERE
      - NEXTAUTH_URL=http://localhost:4001
      - NEXTAUTH_SECRET=changeme_secret_random_string
      - ENABLE_DATHOST=false
      - ENABLE_MATCHZY=false
    restart: unless-stopped

volumes:
  apexplay_data:
    driver: local
