<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ApexPlay - Live Chat Feed</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f1319;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .chat-header {
      padding: 1rem;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      -webkit-app-region: drag;
      cursor: grab;
    }
    .chat-header button, .chat-header div {
      -webkit-app-region: no-drag;
    }
    .close-btn {
      background: transparent;
      border: none;
      color: #64748b;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 0.5rem;
      transition: color 0.2s;
    }
    .close-btn:hover {
      color: #ef4444;
    }
    .chat-header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #chatList {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      list-style: none;
      margin: 0;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.5rem;
    }
    .chat-item {
      animation: fadeIn 0.2s ease-out;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      border-left: 3px solid #64748b;
      font-size: 0.95rem;
      line-height: 1.4;
      transition: background 0.2s;
    }
    .chat-item.ct {
      border-left-color: #3b82f6;
      background: rgba(59, 130, 246, 0.05);
    }
    .chat-item.t {
      border-left-color: #f97316;
      background: rgba(249, 115, 22, 0.05);
    }
    .chat-item.console {
      border-left-color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
      font-style: italic;
    }
    .chat-time {
      color: #64748b;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      font-family: monospace;
    }
    .chat-text {
      word-break: break-word;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .raw-log-container {
      display: none;
      background: #000;
      color: #00ff00;
      font-family: monospace;
      font-size: 10px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      border-top: 1px solid #333;
    }
    .raw-log-container.visible {
      display: block;
    }
    .debug-controls {
      padding: 0.5rem;
      background: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <div>
      <h1>Live Chat Feed</h1>
      <div id="debugInfo" style="font-size: 0.65rem; color: #64748b; margin-top: 4px;">Waiting for server data...</div>
    </div>
    <div style="display:flex; align-items:center; gap:1rem">
      <div style="font-size: 0.7rem; color: #64748b; text-align: right;">
        Monitoring HTTP<br>
        Port 27555
      </div>
      <button class="close-btn" onclick="window.close()">&times;</button>
    </div>
  </div>
  
  <ul id="chatList"></ul>

  <div id="rawLogs" class="raw-log-container"></div>

  <div class="debug-controls">
    <div style="display:flex; gap:10px">
      <button onclick="window.deskApi.copyText('Test: ' + new Date().toLocaleTimeString())" style="font-size: 0.6rem; opacity: 0.5;">Test IPC</button>
      <button onclick="document.getElementById('rawLogs').classList.toggle('visible')" style="font-size: 0.6rem; opacity: 0.5;">Toggle Raw Logs</button>
      <button onclick="window.deskApi.sendCommand('status')" style="font-size: 0.6rem; opacity: 0.8; background: #3b82f6; color: white; border: none; border-radius: 3px; padding: 2px 6px; cursor: pointer;">Force Test</button>
    </div>
    <div style="font-size: 0.6rem; color: #444;">ApexPlay v0.1.0</div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
